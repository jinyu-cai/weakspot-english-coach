services:
  api:
    build: .
    container_name: weakspot-api
    restart: always
    ports:
      # Bind to localhost only — Nginx (same host) proxies to it; not public.
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
